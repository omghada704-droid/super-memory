<body>
    <div class="pay-container">
        <div class="header-back">
            <a href="order.html">
                <i class="fa-solid fa-arrow-right"></i>
                العودة للسلة
            </a>
        </div>

        <div class="pay-card">
            <h1 class="pay-title">
                <i class="fa-solid fa-credit-card"></i>
                إتمام الطلب
            </h1>

            <div id="payContent"></div>
        </div>
    </div>

    <script>
        // تجميع المنتجات المتشابهة في السلة
        function groupCartItems(cart) {
            const grouped = {};
            cart.forEach((item, index) => {
                const key = item.id;
                if (!grouped[key]) {
                    grouped[key] = {
                        ...item,
                        quantity: 1,
                        originalIndex: index
                    };
                } else {
                    grouped[key].quantity += 1;
                }
            });
            return Object.values(grouped);
        }

        function renderPayPage() {
            const container = document.getElementById('payContent');
            let cart = JSON.parse(localStorage.getItem('user_cart')) || [];

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <h2>السلة فاضية!</h2>
                        <p>روح المتجر وضيف اللي عايزه الأول</p>
                        <a href="shop.html" style="display: inline-block; margin-top: 20px; padding: 15px 40px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; text-decoration: none; border-radius: 12px; font-weight: 700;">المتجر</a>
                    </div>
                `;
                return;
            }

            // تجميع المنتجات المتشابهة
            const groupedCart = groupCartItems(cart);

            // حساب الأسعار
            const itemsCount = groupedCart.reduce((sum, item) => sum + item.quantity, 0);
            const subtotal = groupedCart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            // حساب الشحن: 60 جنيه + 6 جنيه لكل كتاب
            const shipping = 60 + (itemsCount * 6);
            const total = subtotal + shipping;

            container.innerHTML = `
                <div class="order-summary">
                    <div class="summary-grid">
                        <div class="summary-item">
                            <div class="summary-label">عدد الكتب</div>
                            <div class="summary-value" id="summaryCount">${itemsCount}</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">سعر الكتب</div>
                            <div class="summary-value" id="summarySubtotal">${subtotal} ج.م</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">الشحن</div>
                            <div class="summary-value" id="summaryShipping">${shipping} ج.م</div>
                        </div>
                    </div>
                </div>

                <h2 style="font-size: 20px; font-weight: 800; color: #ffffff; margin-bottom: 20px;">تفاصيل الطلب</h2>

                <div class="cart-items">
                    ${groupedCart.map((item, index) => {
                        const itemTotal = item.price * item.quantity;
                        return `
                            <div class="cart-item" data-item-id="${item.id}" data-item-index="${item.originalIndex}">
                                <img src="${item.image}" alt="${item.name}">
                                <div class="cart-item-info">
                                    <div class="cart-item-title">${item.name}</div>
                                    <div class="cart-item-price">${item.price} جنيه للقطعة</div>
                                </div>
                                <div class="cart-item-actions">
                                    <div class="qty-control">
                                        <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">
                                            <i class="fa-solid fa-minus" style="font-size: 12px;"></i>
                                        </button>
                                        <span class="qty-value" id="qty-${item.id}">${item.quantity}</span>
                                        <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">
                                            <i class="fa-solid fa-plus" style="font-size: 12px;"></i>
                                        </button>
                                    </div>
                                    <div class="item-total" id="total-${item.id}">${itemTotal} جنيه</div>
                                    <button class="qty-btn remove-btn" onclick="removeItem(${item.id})" title="حذف المنتج">
                                        <i class="fa-solid fa-trash" style="font-size: 14px;"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>

                <div class="total-section">
                    <div class="total-row">
                        <span class="total-label">سعر الكتب (<span id="totalItemsCount">${itemsCount}</span> كتب)</span>
                        <span class="total-value" id="totalSubtotal">${subtotal} جنيه</span>
                    </div>
                    <div class="total-row">
                        <span class="total-label">مصروفية الشحن (60 + <span id="shippingCalc">${itemsCount}</span> × 6)</span>
                        <span class="total-value" id="totalShipping">${shipping} جنيه</span>
                    </div>
                    <div class="total-row">
                        <span class="total-label" style="font-size: 20px; font-weight: 800;">الإجمالي النهائي</span>
                        <span class="total-value total-final" id="finalTotal">${total} جنيه</span>
                    </div>
                </div>

                <h2 style="font-size: 20px; font-weight: 800; color: #ffffff; margin-bottom: 20px;">طريقة الدفع</h2>

                <div style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px;">
                    <label class="payment-option" style="display: flex; align-items: center; gap: 15px; padding: 20px; background: rgba(239, 68, 68, 0.1); border: 2px solid #ef4444; border-radius: 16px; cursor: pointer; transition: all 0.3s;">
                        <input type="radio" name="paymentMethod" value="vodafone_cash" checked style="width: 20px; height: 20px; accent-color: #ef4444;">
                        <div style="flex: 1;">
                            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
                                <i class="fa-solid fa-mobile-screen" style="color: #ef4444; font-size: 24px;"></i>
                                <span style="font-weight: 800; color: #ffffff; font-size: 16px;">فودافون كاش</span>
                            </div>
                            <p style="margin: 0; color: #94a3b8; font-size: 14px;">ادفع بسهولة عن طريق فودافون كاش على رقم: 01154567612</p>
                        </div>
                    </label>
                </div>

                <button class="confirm-btn" onclick="confirmOrder()">
                    <i class="fa-solid fa-check-circle"></i>
                    تأكيد الطلب (<span id="btnTotal">${total}</span> جنيه)
                </button>
            `;
        }

        // تحديث الكمية - تحديث لحظي بدون ريفرش
        function updateQuantity(productId, change) {
            let cart = JSON.parse(localStorage.getItem('user_cart')) || [];
            const productIndex = cart.findIndex(item => item.id === productId);

            if (productIndex === -1) return;

            // إيجاد كل المنتجات اللي لها نفس ID
            const productItems = cart.filter(item => item.id === productId);
            const currentTotalQty = productItems.length;

            if (change < 0 && currentTotalQty <= 1) {
                showToast('آخر قطعة في السلة! استخدم زر الحذف', 'error');
                return;
            }

            if (change < 0) {
                // حذف قطعة واحدة
                const indexToRemove = cart.findIndex(item => item.id === productId);
                cart.splice(indexToRemove, 1);
            } else {
                // إضافة قطعة جديدة
                const product = productItems[0];
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    image: product.image,
                    addedAt: new Date().toISOString()
                });
            }

            // حفظ في localStorage فوراً
            localStorage.setItem('user_cart', JSON.stringify(cart));

            // إعادة رسم الصفحة
            renderPayPage();

            // إرسال حدث تحديث
            window.dispatchEvent(new Event('storage'));
        }

        // حذف منتج من السلة
        function removeItem(productId) {
            let cart = JSON.parse(localStorage.getItem('user_cart')) || [];
            cart = cart.filter(item => item.id !== productId);
            localStorage.setItem('user_cart', JSON.stringify(cart));
            renderPayPage();
            window.dispatchEvent(new Event('storage'));
            showToast('تم حذف المنتج من السلة', 'info');
        }

        function confirmOrder() {
            const cart = JSON.parse(localStorage.getItem('user_cart')) || [];
            const user = JSON.parse(localStorage.getItem('session_user'));

            if (!user) {
                showToast('يرجى تسجيل الدخول أولاً', 'error');
                setTimeout(() => {
                    window.location.href = 'Login.html';
                }, 1500);
                return;
            }

            if (cart.length === 0) {
                showToast('السلة فاضية!', 'error');
                return;
            }

            // Get selected payment method
            const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked');
            const paymentMethodName = 'فودافون كاش';

            // تجميع المنتجات المتشابهة
            const groupedCart = groupCartItems(cart);

            // تجهيز بيانات الطلب - حساب صح للكميات والأسعار
            const itemsList = groupedCart.map(item => `${item.name} (${item.quantity} قطعة)`).join('، ');
            const total = groupedCart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const itemsCount = groupedCart.reduce((sum, item) => sum + item.quantity, 0);
            const shipping = 60 + (itemsCount * 6);
            const finalTotal = total + shipping;

            // حفظ الطلب في localStorage باسم orders و allOrders
            const order = {
                id: 'ORD-' + Date.now(),
                date: new Date().toLocaleDateString('ar-EG'),
                items: cart, // السلة الكاملة
                groupedItems: groupedCart, // المنتجات المجمعة مع الكميات
                itemsNames: itemsList,
                itemsCount: itemsCount, // عدد القطع الكلي
                total: total,
                shipping: shipping,
                finalTotal: finalTotal,
                status: 'pending', // الحالة الافتراضية: قيد الانتظار
                paymentMethod: paymentMethodName,
                customer: {
                    name: user.firstName + ' ' + user.lastName,
                    phone: user.mainPhone,
                    address: user.address + ', ' + user.area + ', ' + user.gov,
                    email: user.email
                },
                studentEmail: user.email // لتتبع طلبات كل طالب
            };

            // حفظ في localStorage باسم orders (للأدمن)
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));

            // حفظ في allOrders كمان (قاعدة بيانات شاملة)
            const allOrders = JSON.parse(localStorage.getItem('allOrders')) || [];
            allOrders.push(order);
            localStorage.setItem('allOrders', JSON.stringify(allOrders));

            // حفظ في user_orders كمان (عشان المستخدم يشوف طلباته)
            const userOrders = JSON.parse(localStorage.getItem('user_orders')) || [];
            userOrders.push(order);
            localStorage.setItem('user_orders', JSON.stringify(userOrders));

            // إرسال حدث تحديث للأدمن (لو صفحة الأدمن مفتوحة)
            window.dispatchEvent(new Event('storage'));

            // تفريغ السلة
            localStorage.removeItem('user_cart');

            // إظهار رسالة نجاح
            if (paymentMethod.value === 'vodafone_cash') {
                showToast(`تم تأكيد طلبك! (${itemsCount} قطعة) - هنتواصل معاك للدفع عبر فودافون كاش`, 'success');
            } else {
                showToast(`تم تأكيد طلبك! (${itemsCount} قطعة) - هنتواصل معاك قريباً`, 'success');
            }

            setTimeout(() => {
                window.location.href = 'account.html';
            }, 2000);
        }

        // Toast Notification
        function showToast(message, type = 'success') {
            let toast = document.getElementById('toast-notification');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast-notification';
                toast.style.cssText = `
                    position: fixed;
                    bottom: -100px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: #312f2f;
                    padding: 16px 24px;
                    border-radius: 16px;
                    box-shadow: 0 10px 40px rgba(255, 255, 255, 0.15);
                    display: flex;
                    align-items: center;
                    gap: 12px;
                    z-index: 2000;
                    transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
                    min-width: 300px;
                `;
                toast.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 12px; flex: 1;">
                        <i class="toast-icon fa-solid fa-circle-check" style="font-size: 22px; color: #2ed573;"></i>
                        <span class="toast-message" style="font-family: 'Cairo'; font-size: 14px; color: #ffffff; font-weight: 600;"></span>
                    </div>
                `;
                document.body.appendChild(toast);
            }

            const toastMessage = toast.querySelector('.toast-message');
            const toastIcon = toast.querySelector('.toast-icon');
            
            toastMessage.textContent = message;
            
            if (type === 'error') {
                toastIcon.className = 'toast-icon fa-solid fa-circle-exclamation';
                toastIcon.style.color = '#ff4757';
            } else {
                toastIcon.className = 'toast-icon fa-solid fa-circle-check';
                toastIcon.style.color = '#2ed573';
            }
            
            toast.style.bottom = '30px';
            
            setTimeout(() => {
                toast.style.bottom = '-100px';
            }, 3500);
        }

        document.addEventListener('DOMContentLoaded', renderPayPage);
    </script>
</body>
</html>
