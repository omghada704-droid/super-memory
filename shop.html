      referrerpolicy="no-referrer"

    <body class="moz-night">
      <!-- Mobile Sidebar Navigation -->
      <nav class="mobile-sidebar" id="mobileSidebar">
        <a href="index.html#hero" class="mobile-sidebar-icon" title="الرئيسية">
          <i class="fa-solid fa-house"></i>
        </a>
        <a href="shop.html" class="mobile-sidebar-icon active" title="المتجر">
          <i class="fa-solid fa-store"></i>
        </a>
        <a href="about.html" class="mobile-sidebar-icon" title="من نحن">
          <i class="fa-solid fa-circle-info"></i>
        </a>
        <a href="support.html" class="mobile-sidebar-icon" title="الدعم">
          <i class="fa-solid fa-headset"></i>
        </a>
        <a href="order.html" class="mobile-sidebar-icon mobile-cart-icon" title="السلة" style="position: relative;">
          <i class="fa-solid fa-cart-shopping"></i>
          <span id="sidebar-cart-count" class="sidebar-cart-count">0</span>
        </a>
        <!-- User Profile / Login Button -->
        <a href="Login.html" class="mobile-sidebar-icon mobile-login-icon" id="mobileLoginIcon" title="تسجيل الدخول">
          <i class="fa-solid fa-right-to-bracket"></i>
        </a>
        <a href="account.html" class="mobile-sidebar-icon mobile-profile-icon" id="mobileProfileIcon" title="حسابي" style="display: none;">
          <i class="fa-solid fa-user"></i>
        </a>
      </nav>

      <!-- Mobile Menu Overlay -->
      <div class="mobile-menu-overlay" id="mobileOverlay" onclick="toggleMobileMenu()"></div>

      <!-- Mobile Bottom Menu (Bottom Sheet) -->
      <div class="mobile-bottom-menu" id="mobileBottomMenu">
        <div class="mobile-menu-header">
          <!-- User Info (Shown when logged in) -->
          <div class="mobile-user-info" id="mobileUserInfo" style="display: none;">
            <div class="mobile-user-avatar" id="mobileUserAvatar">A</div>
            <span class="mobile-user-name" id="mobileUserName">Ahmed</span>
          </div>
          <!-- Guest Info (Shown when not logged in) -->
          <div class="mobile-user-info" id="mobileGuestInfo">
            <span class="mobile-user-name">زائر</span>
          </div>
          <button class="mobile-menu-close" onclick="toggleMobileMenu()">&times;</button>
        </div>
        <!-- Logout Button (Shown when logged in) -->
        <button class="mobile-logout-btn" id="mobileLogoutBtn" onclick="logout()" style="display: none;">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span>تسجيل الخروج</span>
        </button>
        <nav class="mobile-nav">
          <a href="index.html#hero" class="mobile-nav-item" onclick="toggleMobileMenu()">
            <i class="fa-solid fa-house"></i>
            <span>الرئيسية</span>
          </a>
          <a href="shop.html" class="mobile-nav-item active" onclick="toggleMobileMenu()">
            <i class="fa-solid fa-store"></i>
            <span>المتجر</span>
          </a>
          <a href="about.html" class="mobile-nav-item" onclick="toggleMobileMenu()">
            <i class="fa-solid fa-circle-info"></i>
            <span>من نحن</span>
          </a>
          <a href="support.html" class="mobile-nav-item" onclick="toggleMobileMenu()">
            <i class="fa-solid fa-headset"></i>
            <span>الدعم</span>
          </a>
          <a href="Login.html" class="mobile-nav-item" onclick="toggleMobileMenu()">
            <i class="fa-solid fa-right-to-bracket"></i>
            <span>تسجيل الدخول</span>
          </a>
        </nav>
      </div>

      <header class="moz-navbar">
        <div class="moz-container moz-navbar-inner">
          <!-- Mobile Menu Button -->
          <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileMenu()">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <a href="order.html" class="cart-logo-link" style="display: flex; align-items: center; gap: 10px; text-decoration: none; position: relative;">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z'/%3E%3C/svg%3E" alt="Cart" style="width: 35px; height: 35px;">
                <span id="cart-count-badge" class="cart-count-badge" style="position: absolute; top: -8px; right: -8px; background: linear-gradient(135deg, #ff4757, #ff6b81); color: white; font-size: 13px; font-weight: 800; min-width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid #ffffff; box-shadow: 0 3px 10px rgba(255,71,87,0.4);">0</span>
            </a>
          <nav class="desktop-nav">
          <ul class="moz-nav-list">
            <li><a href="index.html#hero">الرئيسية</a></li>
            <li><a href="shop.html" class="is-active">المتجر</a></li>
            <li><a href="about.html">من نحن</a></li>
            <li><a href="support.html">الدعم</a></li>
          </ul>
        </nav>
          <div class="moz-auth-actions" style="display: flex; align-items: center; gap: 15px;">
            <a href="Login.html" class="moz-btn moz-btn-ghost moz-auth-link">تسجيل الدخول</a>
            <a href="Login.html" class="moz-btn moz-btn-primary moz-auth-link">إنشاء حساب</a>
          </div>
      </div>
    </header>

    <main>
      <section class="moz-section">
        <div class="moz-container">
          <h1 class="moz-section-title">كل منتجات مذكرتي</h1>
          <p class="moz-section-sub">
            تصفح جميع المذكرات والكتب المتاحة، واختر المناسب لمستواك ومادتك.
          </p>
          <div id="shop-products-grid" class="moz-products-grid"></div>
        </div>
      </section>
    </main>

    <!-- Shared Modal -->
    <div id="product-modal" class="moz-modal" aria-hidden="true">
      <div class="moz-modal-backdrop" data-modal-close></div>
      <div class="moz-modal-dialog" role="dialog" aria-modal="true">
        <button class="moz-modal-close" type="button" data-modal-close>&times;</button>
        <div class="moz-modal-body">
          <div class="moz-modal-image-wrapper">
            <img id="modal-product-image" src="" alt="" />
          </div>
          <div class="moz-modal-details">
            <h3 id="modal-product-name"></h3>
            <p id="modal-product-price" class="moz-modal-price"></p>
            <div class="moz-modal-actions">
              <button id="modal-primary-action" class="moz-btn moz-btn-primary" type="button">
                اطلب المنتج الآن
              </button>
              <button class="moz-btn moz-btn-ghost" type="button" data-modal-close>
                إغلاق
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast-notification" class="toast-notification">
      <div class="toast-content">
        <i class="toast-icon fa-solid fa-circle-check"></i>
        <span class="toast-message" id="toastMessage">تمت الإضافة بنجاح</span>
      </div>
      <button class="toast-close" onclick="closeToast()">&times;</button>
    </div>

    <script src="products.js"></script>
    <script src="app.js"></script>
    <script>
      // Mobile Sidebar Active State
      document.addEventListener('DOMContentLoaded', function() {
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        const sidebarIcons = document.querySelectorAll('.mobile-sidebar-icon');

        sidebarIcons.forEach(icon => {
          const href = icon.getAttribute('href');
          if (href === currentPage || (currentPage === '' && href === 'index.html')) {
            icon.classList.add('active');
          }
        });
        
        // تحديث حالة تسجيل الدخول
        updateLoginIcon();
      });

      // تحديث أيقونة تسجيل الدخول / البروفايل
      function updateLoginIcon() {
        const loginIcon = document.getElementById('mobileLoginIcon');
        const profileIcon = document.getElementById('mobileProfileIcon');
        const user = localStorage.getItem('session_user');
        
        if (user && loginIcon && profileIcon) {
          loginIcon.style.display = 'none';
          profileIcon.style.display = 'flex';
        } else if (loginIcon && profileIcon) {
          loginIcon.style.display = 'flex';
          profileIcon.style.display = 'none';
        }
      }

      // Mobile Menu Toggle
      function toggleMobileMenu() {
        const bottomMenu = document.getElementById('mobileBottomMenu');
        const overlay = document.getElementById('mobileOverlay');

        if (bottomMenu && overlay) {
          bottomMenu.classList.toggle('is-open');
          overlay.classList.toggle('is-visible');
        }
      }

      function showToast(message, type = 'success') {
        const toast = document.getElementById('toast-notification');
        if (!toast) return;
        const toastMessage = document.getElementById('toastMessage');
        const toastIcon = toast.querySelector('.toast-icon');

        toastMessage.textContent = message;
        if (type === 'error') {
          toastIcon.className = 'toast-icon fa-solid fa-circle-exclamation';
          toastIcon.style.color = '#ff4757';
        } else if (type === 'info') {
          toastIcon.className = 'toast-icon fa-solid fa-circle-info';
          toastIcon.style.color = '#3b82f6';
        } else {
          toastIcon.className = 'toast-icon fa-solid fa-circle-check';
          toastIcon.style.color = '#2ed573';
        }

        toast.classList.add('is-visible');
        setTimeout(() => toast.classList.remove('is-visible'), 3500);
      }

      function closeToast() {
        const toast = document.getElementById('toast-notification');
        toast.classList.remove('is-visible');
      }

      function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('user_cart')) || [];
        
        // تحديث عداد الهيدر
        const countElement = document.getElementById('cart-count-badge');
        if (countElement) {
          countElement.innerText = cart.length;
          countElement.classList.add('bump');
          setTimeout(() => countElement.classList.remove('bump'), 400);
        }
        
        // تحديث عداد الشريط الجانبي
        const sidebarCountElement = document.getElementById('sidebar-cart-count');
        if (sidebarCountElement) {
          sidebarCountElement.innerText = cart.length;
        }
      }
    </script>
  </body>
</html>
